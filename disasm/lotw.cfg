# ld65 config for the Legacy of the Wizard matching disassembly.
# MEMORY regions are written to %O in declaration order, reproducing the
# iNES file layout: header + PRG banks 0..15 + CHR.
MEMORY {
    HDR:   start=$0000, size=$0010, file=%O, fill=yes;
    PRG00: start=$8000, size=$2000, file=%O, fill=yes;
    PRG01: start=$8000, size=$2000, file=%O, fill=yes;
    PRG02: start=$8000, size=$2000, file=%O, fill=yes;
    PRG03: start=$8000, size=$2000, file=%O, fill=yes;
    PRG04: start=$8000, size=$2000, file=%O, fill=yes;
    PRG05: start=$8000, size=$2000, file=%O, fill=yes;
    PRG06: start=$8000, size=$2000, file=%O, fill=yes;
    PRG07: start=$8000, size=$2000, file=%O, fill=yes;
    PRG08: start=$8000, size=$2000, file=%O, fill=yes;
    PRG09: start=$8000, size=$2000, file=%O, fill=yes;
    PRG10: start=$8000, size=$2000, file=%O, fill=yes;
    PRG11: start=$8000, size=$2000, file=%O, fill=yes;
    PRG12: start=$8000, size=$2000, file=%O, fill=yes;
    PRG13: start=$8000, size=$2000, file=%O, fill=yes;
    PRG14: start=$C000, size=$2000, file=%O, fill=yes;
    PRG15: start=$E000, size=$2000, file=%O, fill=yes;
    CHR:   start=$0000, size=$10000, file=%O, fill=yes;
}

SEGMENTS {
    HEADER: load=HDR,   type=ro;
    CODE00: load=PRG00, type=ro;
    CODE01: load=PRG01, type=ro;
    CODE02: load=PRG02, type=ro;
    CODE03: load=PRG03, type=ro;
    CODE04: load=PRG04, type=ro;
    CODE05: load=PRG05, type=ro;
    CODE06: load=PRG06, type=ro;
    CODE07: load=PRG07, type=ro;
    CODE08: load=PRG08, type=ro;
    CODE09: load=PRG09, type=ro;
    CODE10: load=PRG10, type=ro;
    CODE11: load=PRG11, type=ro;
    CODE12: load=PRG12, type=ro;
    CODE13: load=PRG13, type=ro;
    CODE14: load=PRG14, type=ro;
    CODE15: load=PRG15, type=ro;
    CHRROM: load=CHR,   type=ro;
}
