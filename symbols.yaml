version: 1
purpose: >
  Evidence ledger for symbol names proposed during the Rust-only decompilation
  effort. Names should stay null until there is trace, callsite, memory, or
  constant evidence strong enough to justify them.

rules:
  - Do not invent function, variable, or RAM names from address shape alone.
  - Every accepted name needs at least one concrete evidence item.
  - Prefer boring descriptive names over source-like names until behavior is
    confirmed across more than one replay or static proof path.
  - Keep confidence low unless writes, reads, callers, and replay context agree.

evidence_sources:
  labels: build/disasm/labels.txt
  remaining_units: build/whole_program_report/whole_program_remaining_units.tsv
  frontier: build/semantic_match_report/static_frontier_match_status.tsv
  traces: build/trace
  block_exec: build/block_exec

